default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>


development:
  <<: *default
  database: gerenciador_gastos_development
  username: postgres
  password: <%= ENV["DB_PASSWORD"] %>
  host: localhost
  port: 5432


test:
  <<: *default
  database: gerenciador_gastos_test
  username: postgres
  password: <%= ENV["DB_PASSWORD"] %>
  host: localhost
  port: 5432


production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>